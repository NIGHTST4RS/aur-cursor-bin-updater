name: Update AUR Package

on:
  schedule:
    - cron: "17 * * * *" # Run every hour, avoid top-of-hour queue spikes
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: update-aur-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - name: Check for updates and generate PKGBUILD
        id: check
        run: |
          set -euo pipefail
          echo "::group::Checking for updates"

          # Get current version from PKGBUILD
          current_pkgver=$(grep -E '^pkgver=' PKGBUILD | cut -d'=' -f2)
          current_commit=$(grep -E '^_commit=' PKGBUILD | cut -d'=' -f2 | sed 's/ #.*//')
          echo "Local version: $current_pkgver (commit: ${current_commit:0:8})"

          # Get current version from AUR
          aur_response=$(curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 "https://aur.archlinux.org/rpc/?v=5&type=info&arg[]=cursor-ai-bin")
          aur_pkgver=""
          if [ -n "$aur_response" ]; then
            aur_pkgver=$(echo "$aur_response" | jq -r '.results[0].Version // empty' | cut -d'-' -f1)
          fi
          echo "AUR version: ${aur_pkgver:-unknown}"

          # Query the stable update API
          api_response=$(curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 "https://api2.cursor.sh/updates/api/update/linux-x64/cursor/0.0.0/deadbeef/stable")
          if [ -z "$api_response" ]; then
            echo "ERROR: Failed to get response from update API"
            exit 1
          fi

          new_pkgver=$(echo "$api_response" | jq -r '.version')
          api_url=$(echo "$api_response" | jq -r '.url')
          new_commit=$(echo "$api_url" | sed -n 's|.*/production/\([^/]*\).*|\1|p')

          if [ -z "$new_pkgver" ] || [ -z "$new_commit" ]; then
            echo "ERROR: Failed to extract version or commit from API response"
            exit 1
          fi
          if ! [[ "$new_pkgver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: Invalid version format from update API: $new_pkgver"
            exit 1
          fi
          if ! [[ "$new_commit" =~ ^[0-9a-f]{40}$ ]]; then
            echo "ERROR: Invalid commit format from update API: $new_commit"
            exit 1
          fi

          echo "Latest: $new_pkgver (commit: ${new_commit:0:8})"

          # Check if update is needed
          if [ "$current_pkgver" = "$new_pkgver" ] && [ "$current_commit" = "$new_commit" ] && [ "${aur_pkgver:-$current_pkgver}" = "$new_pkgver" ]; then
            echo "No update needed. Local and AUR versions match latest."
            echo "update_needed=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Update needed!"
          echo "update_needed=true" >> $GITHUB_OUTPUT
          echo "new_version=${new_pkgver}" >> $GITHUB_OUTPUT
          echo "new_commit=${new_commit}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

          echo "::group::Generating PKGBUILD"
          # Download .deb file
          curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 15 --max-time 300 "https://downloads.cursor.com/production/${new_commit}/linux/x64/deb/amd64/deb/cursor_${new_pkgver}_amd64.deb" -o /tmp/cursor.deb
          if [ ! -s /tmp/cursor.deb ]; then
            echo "ERROR: Downloaded .deb is empty"
            exit 1
          fi

          # Calculate SHA512
          new_sha=$(sha512sum /tmp/cursor.deb | cut -d ' ' -f 1)

          # Keep Cursor's bundled runtime from upstream .deb to avoid system-Electron mismatches.
          echo "Using upstream bundled runtime (no system Electron dependency)."

          # Generate PKGBUILD from template
          # Use awk for sha512sum replacement as sed has issues with brackets
          awk -v pkgver="${new_pkgver}" \
              -v commit="${new_commit}" \
              -v sha="${new_sha}" \
              'BEGIN {OFS=""}
               /^pkgver=/ {print "pkgver=" pkgver; next}
               /^_commit=/ {print "_commit=" commit; next}
               /^sha512sums\[0\]=/ {print "sha512sums[0]=" sha; next}
               {print}' PKGBUILD.sed > PKGBUILD

          # Basic validation
          if ! grep -q "^pkgver=${new_pkgver}$" PKGBUILD; then
            echo "ERROR: pkgver not set correctly"
            exit 1
          fi
          if ! grep -q "^_commit=${new_commit}" PKGBUILD; then
            echo "ERROR: _commit not set correctly"
            exit 1
          fi
          if ! grep -q "^sha512sums\[0\]=${new_sha}$" PKGBUILD; then
            echo "ERROR: sha512sum not set correctly"
            exit 1
          fi

          echo "✓ PKGBUILD generated and validated"
          cat PKGBUILD
          echo "::endgroup::"

      - name: Notify if no update needed
        if: steps.check.outputs.update_needed == 'false'
        run: echo "No update needed. Stopping workflow."

      - name: Commit changes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          # Clean up untracked files
          git clean -fd

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Add PKGBUILD
          git add PKGBUILD
          git commit -m "Update PKGBUILD to version ${{ steps.check.outputs.new_version }} (commit ${{ steps.check.outputs.new_commit }})" || echo "No changes to commit"

          # Push changes to repository
          echo "Pushing changes to remote repository..."
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check branch and continue or stop workflow
        if: steps.check.outputs.update_needed == 'true'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "On development branch, stopping workflow"
            exit 0
          else
            echo "On main branch, continuing workflow"
          fi

      - name: Install SSH Key
        if: steps.check.outputs.update_needed == 'true' && github.ref != 'refs/heads/development'
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2.8.1
        with:
          key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Publish AUR package
        if: steps.check.outputs.update_needed == 'true' && github.ref != 'refs/heads/development'
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: cursor-ai-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.check.outputs.new_version }} (commit ${{ steps.check.outputs.new_commit }})"
          allow_empty_commits: false
          ssh_keyscan_types: rsa,ecdsa,ed25519
          assets: rg.sh

      - name: Summary
        run: |
          echo "::group::Workflow Summary"
          echo "Update needed: ${{ steps.check.outputs.update_needed }}"
          echo "New version: ${{ steps.check.outputs.new_version }}"
          echo "New commit: ${{ steps.check.outputs.new_commit }}"
          if [ "${{ steps.check.outputs.update_needed }}" = "true" ]; then
            echo "PKGBUILD updated and published to AUR"
          else
            echo "No update needed"
          fi
          echo "::endgroup::"
