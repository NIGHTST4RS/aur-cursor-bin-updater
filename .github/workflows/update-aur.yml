name: Update AUR Package

on:
  schedule:
    - cron: "17 * * * *" # Run every hour, avoid top-of-hour queue spikes
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish to AUR even when versions already match"
        type: choice
        options:
          - "false"
          - "true"
        default: "false"
        required: true

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    concurrency:
      group: update-aur-${{ github.ref }}
      cancel-in-progress: true
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Check for updates and generate PKGBUILD
        id: check
        env:
          FORCE_PUBLISH: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish || 'false' }}
        run: |
          set -euo pipefail
          echo "::group::Checking for updates"

          # Get current version from PKGBUILD
          current_pkgver=$(grep -E '^pkgver=' PKGBUILD | cut -d'=' -f2)
          current_commit=$(grep -E '^_commit=' PKGBUILD | cut -d'=' -f2 | sed 's/ #.*//')
          echo "Local version: $current_pkgver (commit: ${current_commit:0:8})"

          extract_commit_from_url() {
            echo "$1" | sed -n 's|.*/production/\([^/]*\).*|\1|p'
          }

          version_lt() {
            [ "$(printf '%s\n%s\n' "$1" "$2" | sort -V | head -n1)" = "$1" ] && [ "$1" != "$2" ]
          }

          # Get current version from AUR
          aur_response=$(curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 "https://aur.archlinux.org/rpc/?v=5&type=info&arg[]=cursor-ai-bin")
          aur_resultcount=0
          aur_pkgver=""
          aur_exists=false
          if [ -n "$aur_response" ]; then
            aur_resultcount=$(echo "$aur_response" | jq -r '.resultcount // 0')
          fi
          if [ "$aur_resultcount" -gt 0 ]; then
            aur_exists=true
            aur_pkgver=$(echo "$aur_response" | jq -r '.results[0].Version // empty' | cut -d'-' -f1)
          fi
          echo "AUR version: ${aur_pkgver:-unknown}"
          echo "AUR package exists: ${aur_exists}"
          echo "Force publish requested: ${FORCE_PUBLISH}"

          select_candidate() {
            local source="$1"
            local payload="$2"
            local candidate_pkgver candidate_commit candidate_deb_url

            candidate_pkgver=$(echo "$payload" | jq -r '.version // empty')
            candidate_commit=$(echo "$payload" | jq -r '.commitSha // empty')
            candidate_deb_url=$(echo "$payload" | jq -r '.debUrl // empty')
            if [ -z "$candidate_commit" ] && [ -n "$candidate_deb_url" ]; then
              candidate_commit=$(extract_commit_from_url "$candidate_deb_url")
            fi

            if [ -z "$candidate_pkgver" ] || [ -z "$candidate_commit" ] || [ -z "$candidate_deb_url" ]; then
              echo "WARN: Skipping ${source} candidate due to incomplete metadata"
              return
            fi
            if ! [[ "$candidate_pkgver" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "WARN: Skipping ${source} candidate due to invalid version format: ${candidate_pkgver}"
              return
            fi
            if ! [[ "$candidate_commit" =~ ^[0-9a-f]{40}$ ]]; then
              echo "WARN: Skipping ${source} candidate due to invalid commit format: ${candidate_commit}"
              return
            fi

            if [ -z "${new_pkgver:-}" ] || version_lt "$new_pkgver" "$candidate_pkgver"; then
              new_pkgver="$candidate_pkgver"
              new_commit="$candidate_commit"
              deb_url="$candidate_deb_url"
              selected_source="$source"
            fi
          }

          query_golden_minor() {
            local minor="$1"
            [ -n "$minor" ] || return
            local golden_response
            golden_response=$(curl -fsSL --retry 2 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 "https://api2.cursor.sh/updates/api/download/golden/linux-x64-deb/cursor/${minor}" || true)
            if [ -n "$golden_response" ]; then
              select_candidate "golden/${minor}" "$golden_response"
            else
              echo "WARN: Golden API unavailable for ${minor}, continuing."
            fi
          }

          # Base stable endpoint + golden patch-train endpoint(s).
          stable_response=$(curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 10 --max-time 30 "https://www.cursor.com/api/download?platform=linux-x64&releaseTrack=stable")
          if [ -z "$stable_response" ]; then
            echo "ERROR: Failed to get response from stable download API"
            exit 1
          fi

          new_pkgver=""
          new_commit=""
          deb_url=""
          selected_source=""

          select_candidate "stable" "$stable_response"

          stable_pkgver=$(echo "$stable_response" | jq -r '.version // empty')
          stable_minor=$(echo "$stable_pkgver" | awk -F. 'NF>=2 {print $1 "." $2}')
          current_minor=$(echo "$current_pkgver" | awk -F. 'NF>=2 {print $1 "." $2}')

          query_golden_minor "$current_minor"
          if [ "$stable_minor" != "$current_minor" ]; then
            query_golden_minor "$stable_minor"
          fi

          if [ -z "$new_pkgver" ] || [ -z "$new_commit" ] || [ -z "$deb_url" ]; then
            echo "ERROR: Failed to resolve a valid release candidate from stable/golden APIs"
            exit 1
          fi

          echo "Selected latest: $new_pkgver (commit: ${new_commit:0:8}) from ${selected_source}"

          # Safety guard: never auto-downgrade unless force publish is explicit.
          if [ "${FORCE_PUBLISH}" != "true" ] && version_lt "$new_pkgver" "$current_pkgver"; then
            downgrade_reason="Refusing downgrade: stable API version ${new_pkgver} is older than local PKGBUILD ${current_pkgver}."
            echo "$downgrade_reason"
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "update_reason=${downgrade_reason}" >> $GITHUB_OUTPUT
            exit 0
          fi
          if [ "${FORCE_PUBLISH}" != "true" ] && [ "${aur_exists}" = "true" ] && [ -n "$aur_pkgver" ] && version_lt "$new_pkgver" "$aur_pkgver"; then
            downgrade_reason="Refusing downgrade: stable API version ${new_pkgver} is older than AUR ${aur_pkgver}."
            echo "$downgrade_reason"
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "update_reason=${downgrade_reason}" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Decide whether we need to publish/update.
          update_reason=""
          if [ "${FORCE_PUBLISH}" = "true" ]; then
            update_reason="Manual force publish requested."
          elif [ "${aur_exists}" != "true" ]; then
            update_reason="AUR package missing; initial publish required."
          elif [ "$current_pkgver" != "$new_pkgver" ] || [ "$current_commit" != "$new_commit" ]; then
            update_reason="Local PKGBUILD is behind latest upstream."
          elif [ "$aur_pkgver" != "$new_pkgver" ]; then
            update_reason="AUR version differs from latest upstream."
          fi

          if [ -z "$update_reason" ]; then
            echo "No update needed. Local and AUR versions match latest."
            echo "update_needed=false" >> $GITHUB_OUTPUT
            echo "update_reason=Local and AUR versions already match latest upstream." >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Update needed: $update_reason"
          echo "update_needed=true" >> $GITHUB_OUTPUT
          echo "update_reason=${update_reason}" >> $GITHUB_OUTPUT
          echo "new_version=${new_pkgver}" >> $GITHUB_OUTPUT
          echo "new_commit=${new_commit}" >> $GITHUB_OUTPUT
          echo "::endgroup::"

          echo "::group::Generating PKGBUILD"
          # Download .deb file
          curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused --connect-timeout 15 --max-time 300 "${deb_url}" -o /tmp/cursor.deb
          if [ ! -s /tmp/cursor.deb ]; then
            echo "ERROR: Downloaded .deb is empty"
            exit 1
          fi

          # Calculate SHA512
          new_sha=$(sha512sum /tmp/cursor.deb | cut -d ' ' -f 1)

          # Keep Cursor's bundled runtime from upstream .deb to avoid system-Electron mismatches.
          echo "Using upstream bundled runtime (no system Electron dependency)."

          # Generate PKGBUILD from template
          # Use awk for sha512sum replacement as sed has issues with brackets
          awk -v pkgver="${new_pkgver}" \
              -v commit="${new_commit}" \
              -v sha="${new_sha}" \
              'BEGIN {OFS=""}
               /^pkgver=/ {print "pkgver=" pkgver; next}
               /^_commit=/ {print "_commit=" commit; next}
               /^sha512sums\[0\]=/ {print "sha512sums[0]=" sha; next}
               {print}' PKGBUILD.sed > PKGBUILD

          # Basic validation
          if ! grep -q "^pkgver=${new_pkgver}$" PKGBUILD; then
            echo "ERROR: pkgver not set correctly"
            exit 1
          fi
          if ! grep -q "^_commit=${new_commit}" PKGBUILD; then
            echo "ERROR: _commit not set correctly"
            exit 1
          fi
          if ! grep -q "^sha512sums\[0\]=${new_sha}$" PKGBUILD; then
            echo "ERROR: sha512sum not set correctly"
            exit 1
          fi
          if ! grep -q "^install=cursor-ai-bin.install$" PKGBUILD; then
            echo "ERROR: install script is not wired in PKGBUILD"
            exit 1
          fi

          echo "✓ PKGBUILD generated and validated"
          cat PKGBUILD
          echo "::endgroup::"

      - name: Notify if no update needed
        if: steps.check.outputs.update_needed == 'false'
        run: |
          echo "No publish needed: ${{ steps.check.outputs.update_reason }}"

      - name: Commit changes
        if: steps.check.outputs.update_needed == 'true'
        run: |
          # Clean up untracked files
          git clean -fd

          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          # Add PKGBUILD
          git add PKGBUILD
          git commit -m "Update PKGBUILD to version ${{ steps.check.outputs.new_version }} (commit ${{ steps.check.outputs.new_commit }})" || echo "No changes to commit"

          # Push changes to repository
          echo "Pushing changes to remote repository..."
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git" HEAD:${{ github.ref }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Check branch and continue or stop workflow
        if: steps.check.outputs.update_needed == 'true'
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/development" ]]; then
            echo "On development branch, stopping workflow"
            exit 0
          else
            echo "On main branch, continuing workflow"
          fi

      - name: Install SSH Key
        if: steps.check.outputs.update_needed == 'true' && github.ref != 'refs/heads/development'
        uses: shimataro/ssh-key-action@87a8f067114a8ce263df83e9ed5c849953548bc3 # v2.8.1
        with:
          key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          known_hosts: ${{ secrets.KNOWN_HOSTS }}
          if_key_exists: replace

      - name: Publish AUR package
        if: steps.check.outputs.update_needed == 'true' && github.ref != 'refs/heads/development'
        uses: KSXGitHub/github-actions-deploy-aur@abe8ac26b51011c88be58c8809fd2ac674068ea5 # v4.1.2
        with:
          pkgname: cursor-ai-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ steps.check.outputs.new_version }} (commit ${{ steps.check.outputs.new_commit }})"
          allow_empty_commits: false
          ssh_keyscan_types: rsa,ecdsa,ed25519
          assets: rg.sh cursor-ai-bin.install

      - name: Summary
        run: |
          echo "::group::Workflow Summary"
          echo "Update needed: ${{ steps.check.outputs.update_needed }}"
          echo "Reason: ${{ steps.check.outputs.update_reason }}"
          echo "New version: ${{ steps.check.outputs.new_version }}"
          echo "New commit: ${{ steps.check.outputs.new_commit }}"
          if [ "${{ steps.check.outputs.update_needed }}" = "true" ]; then
            echo "PKGBUILD updated and published to AUR"
          else
            echo "No update needed"
          fi
          echo "::endgroup::"
